# --- الإدخال ---
input {
    kb_layout = us,ara                # تخطيطات لوحة المفاتيح (انجليزي/عربي)
    kb_model = pc105                  # موديل الكيبورد
    kb_options = grp:alt_shift_toggle # تبديل اللغة بزر Alt+Shift (جرب أيضاً win_shift_toggle أو win_space_toggle حسب دعم النظام)
    follow_mouse = 1                  # تتبع الفأرة
    sensitivity = 0                   # حساسية الفأرة (0 = افتراضي)
    touchpad {
        natural_scroll = false        # تعطيل التمرير الطبيعي
    }
}

gestures {
    workspace_swipe = false           # تعطيل السحب بين مساحات العمل
}

device {
    name = epic-mouse-v1              # إعدادات خاصة بجهاز معين (مثال)
    sensitivity = -0.5                # حساسية هذا الجهاز
}